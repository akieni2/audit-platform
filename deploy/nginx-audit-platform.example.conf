# Exemple de configuration Nginx + PHP-FPM pour exploitation production.
# Adapter server_name, root, socket PHP et chemins SSL.

server {
    listen 443 ssl http2;
    server_name audit.example.gouv.local;
    root /var/www/audit-platform/public;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    ssl_certificate     /etc/ssl/certs/audit.pem;
    ssl_certificate_key /etc/ssl/private/audit.key;
}
